name: TapeMeasureARPro
options:
  bundleIdPrefix: com.faisalnurarif
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    majorVersion: 2.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    minVersion: 7.0.0
    maxVersion: 9.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_LANGUAGE: en
    # Automatic signing with the owner's team. Scripted Simulator builds pass
    # CODE_SIGNING_ALLOWED=NO on the command line so CI needs no certificates.
    DEVELOPMENT_TEAM: 5VHRN5SF2P
    CODE_SIGN_STYLE: Automatic

targets:
  TapeScan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faisalnurarif.tapescan
        PRODUCT_NAME: TapeScan
        INFOPLIST_FILE: Sources/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/TapeScan.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal

  TapeScanTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/TapeScanTests
    dependencies:
      - target: TapeScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faisalnurarif.tapescan.tests
        GENERATE_INFOPLIST_FILE: YES

  TapeScanUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/TapeScanUITests
    dependencies:
      - target: TapeScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faisalnurarif.tapescan.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TapeScan:
    build:
      targets:
        TapeScan: all
    run:
      config: Debug
      storeKitConfiguration: TapeScan.storekit
    test:
      config: Debug
      targets:
        - TapeScanTests
        - TapeScanUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
